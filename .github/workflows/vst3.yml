name: VST3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install ninja ccache

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ../../Downloads/JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          mkdir -p ../../Downloads
          git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git ../../Downloads/JUCE

      - name: Symlink JUCE
        run: ln -s ../../Downloads/JUCE JUCE

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-vst3-${{ github.sha }}
          restore-keys: ccache-vst3-

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build VST3
        run: cmake --build build --target GainKnob_VST3
